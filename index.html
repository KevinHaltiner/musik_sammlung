<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <title>Music Collection</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" sizes="32x32" href="/data/img/icon/favicon-32.png?v=2">
        <link rel="icon" type="image/png" sizes="16x16" href="/data/img/icon/favicon-16.png?v=2">
        <link rel="icon" href="/data/img/icon/favicon.ico?v=2" type="image/x-icon">
        <meta name="theme-color" content="#111111">
        <link rel="stylesheet" href="/data/css/style.css">
    </head>
    <body>

        <header class="header">
            <h1>🎵 Kevin's Music Collection 🎵</h1>
            <p class="subtitle">Vinyl • CDs • Singles</p>
        </header>

        <select id="mobile-nav">
            <option value="alle">All</option>
            <option value="Platte">Vinyl</option>
            <option value="CD">CDs</option>
            <option value="Single">Singles</option>
            <option value="/sites/kuenstler.html">Artist</option>
            <option value="/sites/genre.html">Genre</option>
        </select>


        <p id="anzahl">
            Total: <strong><span id="count-alle">0</span></strong> |
            Vinyle: <strong><span id="count-platten">0</span></strong> |
            CDs: <strong><span id="count-cds">0</span></strong> |
            Singles: <strong><span id="count-singles">0</span></strong>
        </p>

        <div id="search-container">
            <input type="text" id="searchInput" placeholder="Suche nach Name, Künstler oder Genre...">
            <span id="clearSearch">✖</span>
            <div id="autocomplete" class="autocomplete-list"></div>
        </div>

        <div id="tabs-container">
            <div id="tabs-row">
                <div id="tabs">
                    <div class="tab active" data-type="alle">All</div>
                    <div class="tab" data-type="Platte">Vinyl</div>
                    <div class="tab" data-type="CD">CDs</div>
                    <div class="tab" data-type="Single">Singles</div>
                </div>

                <div id="nav-buttons">
                    <a href="/sites/kuenstler.html">Artist</a>
                    <a href="/sites/genre.html">Genre</a>
                </div>
            </div>
            <hr class="tab-line">
        </div>


        <div class="sort-container">
            <label for="sortSelect">Sort by:</label>
            <select id="sortSelect">
                <option value="Plattenname">Name</option>
                <option value="Künstler">Artist</option>
                <option value="Erscheinungsjahr">Year</option>
            </select>
        </div>

        <div id="collection"></div>

        <footer class="footer">
            <p>🎧 Music Collection • 2026</p>
        </footer>
        <script src="/data/js/script.js"></script>

    </body>
</html>
